<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Art & Craft Marketplace</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">🎨 Art & Craft</a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/gallery.html">Gallery</a>
        <a href="/cart.html">🛒 Cart</a>
        <a id="adminLink" href="/admin.html" style="display:none;">🔒 Admin</a>
        <a id="dbLink" href="/db-viewer.html" style="display:none;">📊 Database</a>
        <a id="logoutBtn" href="#">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <h1>Shopping Cart</h1>

    <div id="cartItems" class="cart-items"></div>

    <div id="cartSummary" class="cart-summary" style="display:none;">
      <h2>Order Summary</h2>
      <p>Total Items: <span id="totalItems">0</span></p>
      <p>Total Price: $<span id="totalPrice">0.00</span></p>

      <div class="checkout-section">
        <h3>Payment Method</h3>
        <label>
          <input type="radio" name="paymentMethod" value="regular" checked> Regular Checkout
        </label>
        <label>
          <input type="radio" name="paymentMethod" value="mpesa"> M-Pesa Payment
        </label>

        <div id="mpesaFields" style="display:none; margin-top:15px;">
          <label for="phoneNumber">Phone Number (Kenyan):</label>
          <input type="tel" id="phoneNumber" placeholder="254712345678" style="width:100%; padding:8px; margin-bottom:10px;">
        </div>

        <button id="checkoutBtn" class="btn">Proceed to Checkout</button>
      </div>
    </div>

    <div id="emptyCart" class="empty-message">
      <p>Your cart is empty</p>
      <a href="/gallery.html" class="btn">Continue Shopping</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Art & Craft Marketplace. All rights reserved.</p>
  </footer>

  <script type="module">
    import { api } from './js/api.js';
    import { auth } from './js/auth.js';
    import { store } from './js/store.js';

    if (!auth.isLoggedIn()) {
      window.location.href = '/login.html';
    }

    function updateNav() {
      const isAdmin = auth.isAdmin();
      document.getElementById('adminLink').style.display = isAdmin ? 'inline' : 'none';
      document.getElementById('dbLink').style.display = isAdmin ? 'inline' : 'none';
      document.getElementById('logoutBtn').onclick = function(e) {
        e.preventDefault();
        auth.logout();
        window.location.href = '/';
      };
    }

    function renderCart() {
      const cart = store.getCart();
      const cartItemsDiv = document.getElementById('cartItems');
      const cartSummary = document.getElementById('cartSummary');
      const emptyCart = document.getElementById('emptyCart');

      if (cart.length === 0) {
        cartItemsDiv.innerHTML = '';
        cartSummary.style.display = 'none';
        emptyCart.style.display = 'block';
        return;
      }

      emptyCart.style.display = 'none';
      cartSummary.style.display = 'block';

      cartItemsDiv.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.title}" width="80">
          <div class="item-details">
            <h3>${item.title}</h3>
            <p>by ${item.artistName}</p>
            <p>$${Number(item.price).toFixed(2)}</p>
          </div>
          <div class="item-controls">
            <label>Qty: 
              <input type="number" min="1" value="${item.quantity}" 
                onchange="updateQty('${item.id}', this.value)">
            </label>
            <button class="btn-remove" onclick="removeItem('${item.id}')">Remove</button>
          </div>
          <p class="item-total">$${(Number(item.price) * (item.quantity || 1)).toFixed(2)}</p>
        </div>
      `).join('');

      const total = cart.reduce((sum, item) => sum + (Number(item.price) * (item.quantity || 1)), 0);
      const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
      
      document.getElementById('totalItems').textContent = totalItems;
      document.getElementById('totalPrice').textContent = total.toFixed(2);
    }

    window.updateQty = function(productId, qty) {
      store.updateQuantity(productId, parseInt(qty));
      renderCart();
    };

    window.removeItem = function(productId) {
      store.removeFromCart(productId);
      renderCart();
    };

    // Payment method selection
    document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const mpesaFields = document.getElementById('mpesaFields');
        mpesaFields.style.display = radio.value === 'mpesa' ? 'block' : 'none';
      });
    });

    // Checkout
    document.getElementById('checkoutBtn').addEventListener('click', async () => {
      const cart = store.getCart();
      const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;

      if (cart.length === 0) {
        alert('Cart is empty');
        return;
      }

      try {
        if (paymentMethod === 'mpesa') {
          const phoneNumber = document.getElementById('phoneNumber').value.trim();
          if (!phoneNumber) {
            alert('Please enter phone number for M-Pesa');
            return;
          }
          const result = await api.mpesaCheckout(cart, phoneNumber);
          alert('M-Pesa prompt sent! Complete payment on your phone.');
        } else {
          const result = await api.checkout(cart);
          alert('Order placed successfully!');
        }
        store.clearCart();
        window.location.href = '/gallery.html';
      } catch (error) {
        alert('Checkout failed: ' + error.message);
      }
    });

    updateNav();
    renderCart();
  </script>
</body>
</html>
