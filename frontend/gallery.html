<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Art & Craft Marketplace</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">🎨 Art & Craft</a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/gallery.html">Gallery</a>
        <a id="cartLink" href="/cart.html" style="display:none;">🛒 Cart</a>
        <a id="adminLink" href="/admin.html" style="display:none;">🔒 Admin</a>
        <a id="dbLink" href="/db-viewer.html" style="display:none;">📊 Database</a>
        <a id="loginBtn" href="/login.html">Login</a>
        <a id="logoutBtn" href="#" style="display:none;">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <h1>Art Gallery</h1>
    
    <div class="filter-section">
      <input type="text" id="searchInput" placeholder="Search products..." class="search-input">
    </div>

    <div id="productList" class="product-grid"></div>
  </main>

  <footer>
    <p>&copy; 2026 Art & Craft Marketplace. All rights reserved.</p>
  </footer>

  <script type="module">
    import { api } from './js/api.js';
    import { auth } from './js/auth.js';

    function updateNav() {
      const loggedIn = auth.isLoggedIn();
      const isAdmin = auth.isAdmin();
      
      document.getElementById('cartLink').style.display = loggedIn ? 'inline' : 'none';
      document.getElementById('adminLink').style.display = isAdmin ? 'inline' : 'none';
      document.getElementById('dbLink').style.display = isAdmin ? 'inline' : 'none';
      document.getElementById('loginBtn').style.display = loggedIn ? 'none' : 'inline';
      document.getElementById('logoutBtn').style.display = loggedIn ? 'inline' : 'none';
      
      if (document.getElementById('logoutBtn')) {
        document.getElementById('logoutBtn').onclick = function(e) {
          e.preventDefault();
          auth.logout();
          updateNav();
          alert('Logged out successfully');
          window.location.href = '/';
        };
      }
    }

    let allProducts = [];

    async function loadProducts() {
      try {
        allProducts = await api.getProducts();
        displayProducts(allProducts);
      } catch (error) {
        console.error('Failed to load products:', error);
        document.getElementById('productList').innerHTML = '<p>Failed to load products</p>';
      }
    }

    function displayProducts(products) {
      const container = document.getElementById('productList');
      if (products.length === 0) {
        container.innerHTML = '<p>No products found</p>';
        return;
      }
      
      container.innerHTML = products.map(product => `
        <div class="product-card">
          <img src="${product.image}" alt="${product.title}" class="product-img">
          <h3>${product.title}</h3>
          <p class="artist">by ${product.artistName}</p>
          <p class="price">$${Number(product.price).toFixed(2)}</p>
          <a href="/product.html?id=${product.id}" class="btn">View Details</a>
        </div>
      `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const filtered = allProducts.filter(p => 
        p.title.toLowerCase().includes(query) ||
        p.description.toLowerCase().includes(query) ||
        p.artistName.toLowerCase().includes(query)
      );
      displayProducts(filtered);
    });

    updateNav();
    loadProducts();
  </script>
</body>
</html>
